name: Deploy Program

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Release tag (release/<program>@<version>) or commit to deploy
        required: true
        type: string
        default: main
      program:
        description: Program
        required: true
        default: mpl-agent-identity
        type: choice
        options:
          - mpl-agent-identity
          - mpl-agent-reputation
          - mpl-agent-validation
          - mpl-agent-tools
      cluster:
        description: Cluster environment
        required: true
        default: devnet
        type: choice
        options:
          - devnet
          - mainnet-beta
          - sonic-devnet
          - sonic-testnet
          - eclipse-mainnet
          - eclipse-testnet
          - eclipse-devnet
      dry_run:
        description: Dry run
        required: false
        type: boolean
        default: false

env:
  CACHE: true

jobs:
  check_tag:
    name: 'Check tag'
    runs-on: ubuntu-latest
    outputs:
      program: ${{ steps.set_program.outputs.program }}
      type: ${{ steps.set_program.outputs.type }}
    steps:
    - name: Check tag
      id: set_program
      env:
        GIT_REF: ${{ inputs.git_ref }}
        PROGRAM: ${{ inputs.program }}
      run: |
        echo "program=${PROGRAM}" >> $GITHUB_OUTPUT
        # Require literal `release/<program>@<...>` — `@*` regex would match `release/<program>` with no version.
        if [[ "${GIT_REF}" == "release/${PROGRAM}@"* ]]; then
          echo "type=release" >> $GITHUB_OUTPUT
        else
          echo "type=ref" >> $GITHUB_OUTPUT
        fi
  build_programs:
    name: Programs
    uses: ./.github/workflows/build-programs.yml
    secrets: inherit
    needs: check_tag
    if: needs.check_tag.outputs.type == 'ref'
    with:
      git_ref: ${{ inputs.git_ref }}

  test_programs:
    name: Test Programs
    uses: ./.github/workflows/test-programs.yml
    secrets: inherit
    needs: [build_programs, check_tag]
    if: needs.check_tag.outputs.type == 'ref'
    with:
      program_matrix: '["${{ inputs.program }}"]'
      git_ref: ${{ inputs.git_ref }}

  test_js:
    name: JS client
    needs: [build_programs, check_tag]
    uses: ./.github/workflows/test-js-client.yml
    secrets: inherit
    if: needs.check_tag.outputs.type == 'ref'
    with:
      git_ref: ${{ inputs.git_ref }}

  test_rust:
    name: Rust client
    needs: [build_programs, check_tag]
    uses: ./.github/workflows/test-rust-client.yml
    secrets: inherit
    if: needs.check_tag.outputs.type == 'ref'
    with:
      git_ref: ${{ inputs.git_ref }}

  deploy_program:
    name: Program / Deploy
    runs-on: ubuntu-latest-16-cores
    needs: [check_tag, test_js, test_programs, test_rust]
    if: |
      always()
      && (needs.test_js.result == 'success' || needs.test_js.result == 'skipped')
      && (needs.test_programs.result == 'success' || needs.test_programs.result == 'skipped')
      && (needs.test_rust.result == 'success' || needs.test_rust.result == 'skipped')
    permissions:
      contents: write
    steps:
      - name: Git checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SVC_TOKEN }}
          ref: ${{ inputs.git_ref }}

      - name: Resolve checked-out commit
        id: resolved
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Load environment variables
        run: cat .github/.env >> $GITHUB_ENV

      - name: Install Rust
        uses: metaplex-foundation/actions/install-rust@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install Solana
        uses: metaplex-foundation/actions/install-solana@v1
        with:
          version: ${{ env.DEPLOY_SOLANA_VERSION }}
          cache: ${{ env.CACHE }}

      - name: Install cargo-release
        uses: metaplex-foundation/actions/install-cargo-release@v1
        if: github.event.inputs.publish_crate == 'true'
        with:
          cache: ${{ env.CACHE }}

      - name: Set RPC
        run: |
          # We do this if waterfall because github actions does not allow dynamic access to secrets
          if [ "${{ inputs.cluster }}" == "devnet" ]; then
            echo RPC=${{ secrets.DEVNET_RPC }} >> $GITHUB_ENV
          elif [ "${{ inputs.cluster }}" == "mainnet-beta" ]; then
            echo RPC=${{ secrets.MAINNET_RPC }} >> $GITHUB_ENV
          elif [ "${{ inputs.cluster }}" == "sonic-devnet" ]; then
            echo RPC=${{ secrets.SONIC_DEVNET_RPC }} >> $GITHUB_ENV
          elif [ "${{ inputs.cluster }}" == "sonic-testnet" ]; then
            echo RPC=${{ secrets.SONIC_TESTNET_RPC }} >> $GITHUB_ENV
          elif [ "${{ inputs.cluster }}" == "eclipse-devnet" ]; then
            echo RPC=${{ secrets.ECLIPSE_DEVNET_RPC }} >> $GITHUB_ENV
          elif [ "${{ inputs.cluster }}" == "eclipse-testnet" ]; then
            echo RPC=${{ secrets.ECLIPSE_TESTNET_RPC }} >> $GITHUB_ENV
          elif [ "${{ inputs.cluster }}" == "eclipse-mainnet" ]; then
            echo RPC=${{ secrets.ECLIPSE_MAINNET_RPC }} >> $GITHUB_ENV
          fi

      - name: Identify Program
        env:
          PROGRAM: ${{ inputs.program }}
          CLUSTER: ${{ inputs.cluster }}
          IDENTITY_PROGRAM_ID: ${{ secrets.IDENTITY_PROGRAM_ID }}
          REPUTATION_PROGRAM_ID: ${{ secrets.REPUTATION_PROGRAM_ID }}
          VALIDATION_PROGRAM_ID: ${{ secrets.VALIDATION_PROGRAM_ID }}
          TOOLS_PROGRAM_ID: ${{ secrets.TOOLS_PROGRAM_ID }}
          PROGRAM_SOLANA_DEPLOY_KEY: ${{ secrets.PROGRAM_SOLANA_DEPLOY_KEY }}
          PROGRAM_SONIC_DEPLOY_KEY: ${{ secrets.PROGRAM_SONIC_DEPLOY_KEY }}
          PROGRAM_ECLIPSE_DEPLOY_KEY: ${{ secrets.PROGRAM_ECLIPSE_DEPLOY_KEY }}
        run: |
          PROGRAM_NAME=$(echo "${PROGRAM}" | tr - _)
          echo PROGRAM_NAME="${PROGRAM_NAME}" >> $GITHUB_ENV

          # Per-program program-id keypair secret (waterfall — github actions does not allow dynamic access to secrets)
          case "${PROGRAM}" in
            mpl-agent-identity)   PROGRAM_ID_KEYPAIR="${IDENTITY_PROGRAM_ID}" ;;
            mpl-agent-reputation) PROGRAM_ID_KEYPAIR="${REPUTATION_PROGRAM_ID}" ;;
            mpl-agent-validation) PROGRAM_ID_KEYPAIR="${VALIDATION_PROGRAM_ID}" ;;
            mpl-agent-tools)      PROGRAM_ID_KEYPAIR="${TOOLS_PROGRAM_ID}" ;;
            *) echo "Invalid program: ${PROGRAM}"; exit 1 ;;
          esac

          if [ -z "${PROGRAM_ID_KEYPAIR}" ]; then
            echo "Missing program-id secret for ${PROGRAM} (set IDENTITY_PROGRAM_ID / REPUTATION_PROGRAM_ID / VALIDATION_PROGRAM_ID / TOOLS_PROGRAM_ID)."
            exit 1
          fi
          echo "${PROGRAM_ID_KEYPAIR}" > ./program-id.json

          case "${CLUSTER}" in
            sonic*)       DEPLOYER_KEY="${PROGRAM_SONIC_DEPLOY_KEY}" ;;
            eclipse*)     DEPLOYER_KEY="${PROGRAM_ECLIPSE_DEPLOY_KEY}" ;;
            devnet)       DEPLOYER_KEY="${PROGRAM_SOLANA_DEPLOY_KEY}" ;;
            mainnet-beta) DEPLOYER_KEY="${PROGRAM_SOLANA_DEPLOY_KEY}" ;;
            *) echo "Invalid cluster: ${CLUSTER}"; exit 1 ;;
          esac

          if [ -z "${DEPLOYER_KEY}" ]; then
            echo "Missing deployer-key secret for cluster ${CLUSTER}."
            exit 1
          fi
          echo "${DEPLOYER_KEY}" > ./deployer-key.json
          echo DEPLOY_TYPE="direct" >> $GITHUB_ENV

      - name: Sanitize Ref
        id: sanitize
        shell: bash
        run: |
          REF="${{ inputs.git_ref }}"
          if [ -z "$REF" ]; then
            REF="default"
          fi
          SANITIZED=${REF//\//-}
          echo "sanitized=$SANITIZED" >> "$GITHUB_OUTPUT"

      - name: Download program builds
        uses: actions/download-artifact@v4
        if: needs.check_tag.outputs.type == 'ref'
        with:
          name: program-builds-${{ steps.sanitize.outputs.sanitized }}
      
      - name: Download release asset
        uses: actions/github-script@v5
        id: get_release
        if: needs.check_tag.outputs.type == 'release'
        with:
          script: |
            const tag = "${{ inputs.git_ref }}";
            const assetName = "${{ env.PROGRAM_NAME }}_program.so";

            // Fetch the release associated with the tag
            const release = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: tag
            });
            
            if (release.status !== 200) {
              throw new Error(`Failed to fetch release for tag ${tag}`);
            }
            
            const asset = release.data.assets.find(asset => asset.name === assetName);
            if (!asset) {
              throw new Error(`Asset ${assetName} not found in release tagged ${tag}`);
            }

            core.setOutput("url", asset.url);

      - name: Download the Selected Asset
        if: needs.check_tag.outputs.type == 'release'
        run: |
          mkdir -p ${{ github.workspace }}/programs/.bin
          curl -L -o ${{ github.workspace }}/programs/.bin/${{ env.PROGRAM_NAME }}_program.so \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            "${{ steps.get_release.outputs.url }}"

      - name: Deploy Program
        if: github.event.inputs.dry_run == 'false' && env.DEPLOY_TYPE == 'direct'
        run: |
          echo "Deploying ${{ needs.check_tag.outputs.program }} to ${{ inputs.cluster }}"

          solana -v program deploy ./programs/.bin/${{ env.PROGRAM_NAME }}_program.so \
            -u ${{ env.RPC }} \
            --program-id ./program-id.json \
            -k ./deployer-key.json \
            --max-sign-attempts 100 \
            --use-rpc

          rm ./deployer-key.json
          rm ./program-id.json

      - name: Deploy squads buffer
        if: github.event.inputs.dry_run == 'false' && env.DEPLOY_TYPE == 'squads'
        run: |
          echo "Deploying buffer for ${{ inputs.program }} on ${{ inputs.cluster }}"
          echo ${{ secrets.SQUADS_BOT_KEY }} > ./submitter-key.json

          BUFFER=$(solana program write-buffer -u ${{ env.RPC }} -k ./submitter-key.json --max-sign-attempts 100 --use-rpc ./programs/.bin/${{ env.PROGRAM_NAME }}_program.so | awk '{print $2}')
          echo "Buffer: $BUFFER"

          solana program set-buffer-authority $BUFFER \
            --new-buffer-authority ${{ env.SQUADS_VAULT }} \
            -k ./submitter-key.json \
            -u ${{ env.RPC }}

          rm ./submitter-key.json

          echo "BUFFER=$BUFFER" >> $GITHUB_ENV
    

      - name: Create env tag
        uses: actions/github-script@v7
        if: github.event.inputs.dry_run == 'false'
        env:
          REF_TYPE: ${{ needs.check_tag.outputs.type }}
          GIT_REF: ${{ inputs.git_ref }}
          PROGRAM: ${{ needs.check_tag.outputs.program }}
          CLUSTER: ${{ inputs.cluster }}
          RESOLVED_SHA: ${{ steps.resolved.outputs.sha }}
        with:
          github-token: ${{ secrets.GH_TAGGER_TOKEN }}
          script: |
            // For release tags we can dereference via the GitHub API. For ref inputs
            // (branch names, SHAs) getRef won't accept a bare value, so use the SHA
            // we resolved from the checked-out workspace instead.
            let sha;
            if (process.env.REF_TYPE === 'release') {
              const refData = await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${process.env.GIT_REF}`,
              });
              sha = refData.data.object.sha;
            } else {
              sha = process.env.RESOLVED_SHA;
              if (!sha) {
                throw new Error('Resolved checkout SHA is empty');
              }
            }

            const envRef = `${process.env.PROGRAM}-${process.env.CLUSTER}`;
            try {
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `refs/tags/${envRef}`,
                sha,
              });
            } catch (err) {
              if (err.status !== 422) throw err;
              await github.rest.git.updateRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${envRef}`,
                sha,
              });
            }
